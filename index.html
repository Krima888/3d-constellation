<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✨ KRIMA'S CONSTELLATION ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: radial-gradient(circle at center, #010118 0%, #000000 100%);
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', monospace;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }
        
        /* Mobile-friendly message panel */
        .star-message {
            position: fixed;
            bottom: 20px;
            left: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 14px 18px;
            border-radius: 20px;
            color: #0ff;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            z-index: 200;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: 0.2s;
        }
        
        .title {
            position: fixed;
            top: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(0, 255, 255, 0.7);
            font-size: 12px;
            letter-spacing: 3px;
            font-family: monospace;
            z-index: 200;
            pointer-events: none;
            text-shadow: 0 0 5px #0ff;
        }
        
        .controls {
            position: fixed;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 8px;
            color: #0ff;
            font-family: monospace;
            z-index: 200;
            pointer-events: none;
        }
        
        .brand {
            position: fixed;
            bottom: 12px;
            left: 12px;
            color: rgba(0, 255, 255, 0.4);
            font-size: 8px;
            font-family: monospace;
            z-index: 200;
            pointer-events: none;
        }
        
        @media (min-width: 768px) {
            .star-message { font-size: 14px; padding: 16px 24px; max-width: 500px; left: 50%; transform: translateX(-50%); right: auto; bottom: 25px; }
            .title { font-size: 14px; top: 20px; }
            .controls { font-size: 10px; }
            .brand { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="title">✦ KRIMA'S CONSTELLATION ✦</div>
    <div class="star-message" id="starMessage">✨ TOUCH A STAR ✨</div>
    <div class="controls">🖱️ DRAG • ZOOM</div>
    <div class="brand">✦ KRIMA.COSMIC ✦</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Optimized for mobile - fewer particles, simpler effects
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020218);
        
        // Mobile-friendly camera
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.3, 50);
        camera.position.set(0, 1.5, 12);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        // --- Stars Data with cool messages ---
        const starsData = [
            { name: "⚡ POLARIS", msg: "Your path is illuminated. Trust your direction.", color: 0xffaa88, size: 0.32, x: -2, y: 1.8, z: -4 },
            { name: "💎 SIRIUS", msg: "Shine without apology. Your light matters.", color: 0xffdd99, size: 0.35, x: 2.2, y: -1, z: -4.5 },
            { name: "🌀 VEGA", msg: "Creativity flows through you. Make something beautiful.", color: 0x99ccff, size: 0.3, x: -1, y: -1.5, z: -5 },
            { name: "🌙 ARCTURUS", msg: "Protection surrounds you. You are safe.", color: 0xffaa77, size: 0.33, x: 1.8, y: 1.8, z: -3.5 },
            { name: "✨ ALTAIR", msg: "Rise above. Your time to fly is now.", color: 0xfff5aa, size: 0.28, x: -2.2, y: -0.5, z: -4.8 },
            { name: "🔥 BETELGEUSE", msg: "Passion ignites. Follow what excites you.", color: 0xff8866, size: 0.38, x: -0.3, y: 2, z: -3.8 },
            { name: "💎 SPICA", msg: "Your efforts will bloom. Keep going.", color: 0xccffff, size: 0.31, x: 2.5, y: 0.5, z: -5 },
            { name: "🌌 ANTARES", msg: "Embrace change fearlessly. Transformation awaits.", color: 0xff6666, size: 0.36, x: -2.5, y: -1.2, z: -3.2 },
            { name: "⭐ DENEB", msg: "Your creativity takes flight. Express yourself.", color: 0xfff5dd, size: 0.32, x: 0, y: 2.2, z: -5.5 },
            { name: "👑 KRIMA", msg: "✦ YOUR STAR ✦ The universe celebrates you right now.", color: 0xff66cc, size: 0.42, x: 0.6, y: -0.3, z: -3.5 }
        ];
        
        const starMeshes = [];
        
        // Create stars with glow lights (optimized)
        starsData.forEach((star, i) => {
            const geometry = new THREE.SphereGeometry(star.size, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: star.color,
                emissive: star.color,
                emissiveIntensity: 0.4,
                metalness: 0.7,
                roughness: 0.3
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(star.x, star.y, star.z);
            sphere.userData = { name: star.name, message: star.msg };
            scene.add(sphere);
            starMeshes.push(sphere);
            
            // Add point light (optimized intensity)
            const light = new THREE.PointLight(star.color, 0.5, 10);
            light.position.set(star.x, star.y, star.z);
            scene.add(light);
        });
        
        // --- Reduced particle count for mobile (800 stars instead of 4000) ---
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePos[i*3] = (Math.random() - 0.5) * 120;
            particlePos[i*3+1] = (Math.random() - 0.5) * 70;
            particlePos[i*3+2] = (Math.random() - 0.5) * 50 - 15;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // Simple ring (one ring only for performance)
        const ringGeo = new THREE.TorusGeometry(2.8, 0.05, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x33aaff, emissive: 0x2288ff, emissiveIntensity: 0.3 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.2;
        scene.add(ring);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.4);
        backLight.position.set(-1, 1, -4);
        scene.add(backLight);
        
        // Raycaster for touch/click
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        const msgDiv = document.getElementById('starMessage');
        
        function handleTap(event) {
            const x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            const y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            pointer.set(x, y);
            raycaster.setFromCamera(pointer, camera);
            const hits = raycaster.intersectObjects(starMeshes);
            
            if (hits.length > 0) {
                const star = hits[0].object;
                const data = star.userData;
                msgDiv.innerHTML = `✦ ${data.name} ✦<br><span style="font-size: 10px;">${data.message}</span>`;
                msgDiv.style.borderColor = '#ff66cc';
                msgDiv.style.boxShadow = '0 0 20px rgba(255,102,204,0.4)';
                
                star.material.emissiveIntensity = 0.9;
                setTimeout(() => { star.material.emissiveIntensity = 0.4; }, 300);
                
                clearTimeout(window.msgTimer);
                window.msgTimer = setTimeout(() => {
                    msgDiv.innerHTML = '✨ TOUCH A STAR ✨';
                    msgDiv.style.borderColor = '#0ff';
                }, 4000);
            }
        }
        
        function handleHover(event) {
            const x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            const y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            pointer.set(x, y);
            raycaster.setFromCamera(pointer, camera);
            const hits = raycaster.intersectObjects(starMeshes);
            
            if (hits.length > 0 && !msgDiv.innerHTML.includes('✦')) {
                msgDiv.innerHTML = `✦ ${hits[0].object.userData.name} ✦`;
            } else if (hits.length === 0 && !msgDiv.innerHTML.includes('TOUCH A STAR') && !msgDiv.innerHTML.includes('✦')) {
                msgDiv.innerHTML = '✨ TOUCH A STAR ✨';
                msgDiv.style.borderColor = '#0ff';
            }
        }
        
        // Support both mouse and touch
        window.addEventListener('click', handleTap);
        window.addEventListener('mousemove', handleHover);
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
            handleTap(fakeEvent);
        });
        
        // Animation
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            starMeshes.forEach((star, i) => {
                star.rotation.y += 0.01;
                star.rotation.x += 0.005;
            });
            
            ring.rotation.z += 0.003;
            ring.rotation.y += 0.002;
            particles.rotation.y += 0.0005;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✨ Mobile Optimized Constellation Active ✨');
    </script>
</body>
</html>
